  #     - "25:25"
  #     - "587:587"
  #     - "993:993"
  #   volumes:
  #     - ./mail:/data
  #   logging: *a7-logging
  #   labels:
  #     <<: *a7-labels
  #     com.a7.service: mail
  #     com.a7.role: mail-server

volumes:
  lmstudio_data:
    name: a7_server_1_lmstudio_data
  openclaw_state:
    name: a7_server_1_openclaw_state
  openclaw_plugins:
    name: a7_server_1_openclaw_plugins