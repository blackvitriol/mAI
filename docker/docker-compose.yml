name: a7_server_1

x-a7-logging: &a7-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

x-a7-labels: &a7-labels
  com.a7.system: a7_server_1
  com.a7.managed-by: docker-compose

networks:
  a7_server_1:
    name: a7_server_1
    driver: bridge

services:
  portainer:
    image: portainer/portainer-ce:latest
    container_name: a7_server_1-portainer
    restart: unless-stopped
    networks:
      - a7_server_1
    ports:
      - "${PORTAINER_PORT:-9443}:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./portainer:/data
    logging: *a7-logging
    labels:
      <<: *a7-labels
      com.a7.service: portainer
      com.a7.role: dashboard

  postgres:
    image: postgres:16-alpine
    container_name: a7_server_1-postgres
    restart: unless-stopped
    networks:
      - a7_server_1
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-n8n}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-n8n}
    volumes:
      - ./postgres:/var/lib/postgresql/data
    logging: *a7-logging
    labels:
      <<: *a7-labels
      com.a7.service: postgres
      com.a7.role: database
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-n8n} -d ${POSTGRES_DB:-n8n}"]
      interval: 5s
      timeout: 5s
      retries: 8
      start_period: 10s

  n8n:
    image: n8nio/n8n:latest
    container_name: a7_server_1-n8n
    restart: unless-stopped
    networks:
      - a7_server_1
    depends_on:
      postgres:
        condition: service_healthy
      browserless:
        condition: service_healthy
    ports:
      - "${N8N_PORT:-5678}:5678"
    environment:
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=5678
      - N8N_PROTOCOL=${N8N_PROTOCOL:-http}
      - GENERIC_TIMEZONE=${TZ:-UTC}
      - TZ=${TZ:-UTC}
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB:-n8n}
      - DB_POSTGRESDB_USER=${POSTGRES_USER:-n8n}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - PUPPETEER_SKIP_CHROMIUM_DOWNLOAD=true
      - PUPPETEER_BROWSER_WS_ENDPOINT=ws://browserless:3000
      - PUPPETEER_WS_ENDPOINT=ws://browserless:3000
      - PUPPETEER_PROTOCOL=cdp
    volumes:
      - ./n8n:/home/node/.n8n
    logging: *a7-logging
    labels:
      <<: *a7-labels
      com.a7.service: n8n
      com.a7.role: automation
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5678/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s

  website:
    image: nginx:alpine
    container_name: a7_server_1-website
    restart: unless-stopped
    networks:
      - a7_server_1
    ports:
      - "${WEB_HTTP_PORT:-80}:80"
      - "${WEB_HTTPS_PORT:-443}:443"
    volumes:
      - ./www:/usr/share/nginx/html:ro
    logging: *a7-logging
    labels:
      <<: *a7-labels
      com.a7.service: website
      com.a7.role: web-hosting
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 5s

  browserless:
    image: ${BROWSERLESS_IMAGE:-ghcr.io/browserless/chromium:latest}
    container_name: a7_server_1-browserless
    restart: unless-stopped
    networks:
      - a7_server_1
    ports:
      - "${BROWSERLESS_PORT:-3000}:3000"
    environment:
      PORT: "3000"
      MAX_CONCURRENT_SESSIONS: ${BROWSERLESS_MAX_SESSIONS:-10}
      PREBOOT_CHROME: ${BROWSERLESS_PREBOOT_CHROME:-true}
    shm_size: "2gb"
    logging: *a7-logging
    labels:
      <<: *a7-labels
      com.a7.service: browserless
      com.a7.role: headless-browser
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/docs').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  ollama:
    image: ollama/ollama:latest
    container_name: a7_server_1-ollama
    restart: unless-stopped
    networks:
      - a7_server_1
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
    volumes:
      - ./ollama:/root/.ollama
      - ./shared:/shared
    gpus: all
    logging: *a7-logging
    labels:
      <<: *a7-labels
      com.a7.service: ollama
      com.a7.role: llm
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  openclaw-gateway:
    image: ${OPENCLAW_IMAGE:-ghcr.io/openclaw/openclaw:latest}
    container_name: a7_server_1-openclaw-gateway
    restart: unless-stopped
    networks:
      - a7_server_1
    depends_on:
      ollama:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      HOME: /home/node
      OPENCLAW_HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_STATE_DIR: /home/node/.openclaw
      OPENCLAW_CONFIG_PATH: /home/node/.openclaw/openclaw.json
      OPENCLAW_CONFIG_DIR: /home/node/.openclaw
      OPENCLAW_WORKSPACE_DIR: /home/node/.openclaw/workspace
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      OPENCLAW_DISABLE_BONJOUR: ${OPENCLAW_DISABLE_BONJOUR:-1}
      TZ: ${TZ:-UTC}
    volumes:
      - ./openclaw/config:/home/node/.openclaw
      - ./openclaw/workspace:/home/node/.openclaw/workspace
      - ./openclaw/secrets:/home/node/.config/openclaw
      - ./shared:/shared
    cap_drop:
      - NET_RAW
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${OPENCLAW_GATEWAY_PORT:-18789}:18789"
      - "${OPENCLAW_BRIDGE_PORT:-18790}:18790"
    init: true
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "${OPENCLAW_GATEWAY_BIND:-lan}",
        "--port",
        "18789",
      ]
    logging: *a7-logging
    labels:
      <<: *a7-labels
      com.a7.service: openclaw-gateway
      com.a7.role: ai-agent
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  openclaw-cli:
    image: ${OPENCLAW_IMAGE:-ghcr.io/openclaw/openclaw:latest}
    container_name: a7_server_1-openclaw-cli
    profiles:
      - cli
    network_mode: "service:openclaw-gateway"
    env_file:
      - path: .env
        required: false
    cap_drop:
      - NET_RAW
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
    environment:
      HOME: /home/node
      OPENCLAW_HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_STATE_DIR: /home/node/.openclaw
      OPENCLAW_CONFIG_PATH: /home/node/.openclaw/openclaw.json
      OPENCLAW_CONFIG_DIR: /home/node/.openclaw
      OPENCLAW_WORKSPACE_DIR: /home/node/.openclaw/workspace
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      BROWSER: echo
      TZ: ${TZ:-UTC}
    volumes:
      - ./openclaw/config:/home/node/.openclaw
      - ./openclaw/workspace:/home/node/.openclaw/workspace
      - ./openclaw/secrets:/home/node/.config/openclaw
      - ./shared:/shared
    stdin_open: true
    tty: true
    init: true
    entrypoint: ["node", "dist/index.js"]
    depends_on:
      openclaw-gateway:
        condition: service_healthy

  # Mail server — replace with your stack (Mailcow, Mailu, etc.)
