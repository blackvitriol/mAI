name: a7_server_1

x-a7-logging: &a7-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

x-a7-labels: &a7-labels
  com.a7.system: a7_server_1
  com.a7.managed-by: docker-compose

networks:
  a7_server_1:
    name: a7_server_1
    driver: bridge

services:
  portainer:
    image: portainer/portainer-ce:${PORTAINER_VERSION:-2.39.3}
    pull_policy: if_not_present
    container_name: a7_server_1-portainer
    networks:
      - a7_server_1
    ports:
      - "${PORTAINER_PORT:-9443}:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./portainer:/data
    logging: *a7-logging
    labels:
      <<: *a7-labels
      com.a7.service: portainer
      com.a7.role: dashboard

  postgres:
    image: postgres:${POSTGRES_VERSION:-16.8-alpine}
    pull_policy: if_not_present
    container_name: a7_server_1-postgres
    networks:
      - a7_server_1
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-n8n}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-n8n}
    volumes:
      - ./postgres:/var/lib/postgresql/data
    logging: *a7-logging
    labels:
      <<: *a7-labels
      com.a7.service: postgres
      com.a7.role: database
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-n8n} -d ${POSTGRES_DB:-n8n}"]
      interval: 5s
      timeout: 5s
      retries: 8
      start_period: 10s

  n8n:
    build:
      context: ./n8n-image
      args:
        NODE_IMAGE: node:${NODE_VERSION:-22-bookworm-slim}
        N8N_VERSION: ${N8N_VERSION:-2.26.6}
    image: a7_server_1-n8n:${N8N_VERSION:-2.26.6}
    pull_policy: never
    container_name: a7_server_1-n8n
    networks:
      - a7_server_1
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${N8N_PORT:-5678}:5678"
    shm_size: "1gb"
    environment:
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=5678
      - N8N_PROTOCOL=${N8N_PROTOCOL:-http}
      - GENERIC_TIMEZONE=${TZ:-UTC}
      - TZ=${TZ:-UTC}
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB:-n8n}
      - DB_POSTGRESDB_USER=${POSTGRES_USER:-n8n}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - N8N_COMMUNITY_PACKAGES_ALLOW_TOOL_USAGE=true
      - N8N_REINSTALL_MISSING_PACKAGES=false
      - PUPPETEER_CACHE_DIR=/home/node/.n8n/puppeteer-cache
    volumes:
      - ./n8n:/home/node/.n8n
    logging: *a7-logging
    labels:
      <<: *a7-labels
      com.a7.service: n8n
      com.a7.role: automation
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5678/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s

  website:
    image: nginx:${NGINX_VERSION:-1.27.5-alpine}
    pull_policy: if_not_present
    container_name: a7_server_1-website
    networks:
      - a7_server_1
    ports:
      - "${WEB_HTTP_PORT:-80}:80"
      - "${WEB_HTTPS_PORT:-443}:443"
    volumes:
      - ./www:/usr/share/nginx/html:ro
    logging: *a7-logging
    labels:
      <<: *a7-labels
      com.a7.service: website
      com.a7.role: web-hosting
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 5s

  lmstudio:
    build:
      context: ./lmstudio-image
      args:
        UBUNTU_VERSION: ${UBUNTU_VERSION:-22.04}
    image: a7_server_1-lmstudio:${UBUNTU_VERSION:-22.04}
    pull_policy: never
    container_name: a7_server_1-lmstudio
    networks:
      - a7_server_1
    ports:
      - "${LM_STUDIO_PORT:-1234}:1234"
    environment:
      LM_STUDIO_PORT: ${LM_STUDIO_PORT:-1234}
      LM_STUDIO_MODEL_ID: ${LM_STUDIO_MODEL_ID:-gemma-4-e2b-it}
      LM_STUDIO_GPU: ${LM_STUDIO_GPU:-max}
      LM_STUDIO_CONTEXT_LENGTH: ${LM_STUDIO_CONTEXT_LENGTH:-65536}
      LMS_SERVER_HOST: 0.0.0.0
    volumes:
      - ${LM_STUDIO_MODELS_PATH}:/root/.lmstudio/models
      - lmstudio_data:/root/.lmstudio
    gpus: all
    shm_size: "2gb"
    logging: *a7-logging
    labels:
      <<: *a7-labels
      com.a7.service: lmstudio
      com.a7.role: llm
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-qO-",
          "http://127.0.0.1:1234/v1/models",
        ]
      interval: 30s
      timeout: 10s
      retries: 15
      start_period: 300s

  openclaw-gateway:
    build:
      context: ./openclaw-image
      args:
        OPENCLAW_VERSION: ${OPENCLAW_VERSION:-2026.5.4}
    image: a7_server_1-openclaw:${OPENCLAW_VERSION:-2026.5.4}
    pull_policy: never
    container_name: a7_server_1-openclaw-gateway
    user: root
    networks:
      - a7_server_1
    depends_on:
      lmstudio:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      HOME: /home/node
      OPENCLAW_HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_STATE_DIR: /home/node/.openclaw
      OPENCLAW_CONFIG_PATH: /home/node/.openclaw/openclaw.json
      OPENCLAW_CONFIG_DIR: /home/node/.openclaw
      OPENCLAW_WORKSPACE_DIR: /home/node/.openclaw/workspace
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      OPENCLAW_DISABLE_BONJOUR: ${OPENCLAW_DISABLE_BONJOUR:-1}
      LM_API_TOKEN: ${LM_API_TOKEN:-lmstudio}
      LM_STUDIO_MODEL_ID: ${LM_STUDIO_MODEL_ID:-gemma-4-e2b-it}
      TZ: ${TZ:-UTC}
    volumes:
      - ./openclaw/config:/home/node/.openclaw
      - openclaw_state:/home/node/.openclaw/state
      - openclaw_plugins:/home/node/.openclaw/agents/main/agent/plugins
      - ./openclaw/workspace:/home/node/.openclaw/workspace
      - ./openclaw/secrets:/home/node/.config/openclaw
      - ./shared:/shared
    cap_drop:
      - NET_RAW
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${OPENCLAW_GATEWAY_PORT:-18789}:18789"
      - "${OPENCLAW_BRIDGE_PORT:-18790}:18790"
    init: true
    entrypoint: ["/entrypoint.sh"]
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "${OPENCLAW_GATEWAY_BIND:-lan}",
        "--port",
        "18789",
      ]
    logging: *a7-logging
    labels:
      <<: *a7-labels
      com.a7.service: openclaw-gateway
      com.a7.role: ai-agent
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  openclaw-cli:
    build:
      context: ./openclaw-image
      args:
        OPENCLAW_VERSION: ${OPENCLAW_VERSION:-2026.5.4}
    image: a7_server_1-openclaw:${OPENCLAW_VERSION:-2026.5.4}
    pull_policy: never
    container_name: a7_server_1-openclaw-cli
    profiles:
      - cli
    user: root
    network_mode: "service:openclaw-gateway"
    env_file:
      - path: .env
        required: false
    cap_drop:
      - NET_RAW
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
    environment:
      HOME: /home/node
      OPENCLAW_HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_STATE_DIR: /home/node/.openclaw
      OPENCLAW_CONFIG_PATH: /home/node/.openclaw/openclaw.json
      OPENCLAW_CONFIG_DIR: /home/node/.openclaw
      OPENCLAW_WORKSPACE_DIR: /home/node/.openclaw/workspace
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      BROWSER: echo
      TZ: ${TZ:-UTC}
    volumes:
      - ./openclaw/config:/home/node/.openclaw
      - openclaw_state:/home/node/.openclaw/state
      - openclaw_plugins:/home/node/.openclaw/agents/main/agent/plugins
      - ./openclaw/workspace:/home/node/.openclaw/workspace
      - ./openclaw/secrets:/home/node/.config/openclaw
      - ./shared:/shared
    stdin_open: true
    tty: true
    init: true
    entrypoint: ["/entrypoint.sh"]
    command: ["node", "dist/index.js"]
    depends_on:
      openclaw-gateway:
        condition: service_healthy

  # Mail server — replace with your stack (Mailcow, Mailu, etc.)
  # mail:
  #   image: your-mail-image:tag
  #   container_name: a7_server_1-mail
  #   networks:
  #     - a7_server_1
